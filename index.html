<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meleğimin Doğum Günü</title>

<style>

body{
margin:0;
padding:0;
overflow-x:hidden;
font-family:'Segoe UI', cursive;
background: radial-gradient(circle at top,#ffd6e8,#ff8fab);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
min-height:100vh;
}

.bg-heart{
position:absolute;
font-size:22px;
animation: floatUp 10s linear infinite;
opacity:0.7;
}

@keyframes floatUp{
0%{ transform:translateY(100vh) scale(0.5); opacity:0;}
50%{ opacity:1;}
100%{ transform:translateY(-10vh) scale(1.2); opacity:0;}
}

.envelope{
width:320px;
height:220px;
background: linear-gradient(45deg,#ffb3c6,#ffc2d1);
border-radius:15px;
position:relative;
cursor:pointer;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
display:flex;
justify-content:center;
align-items:center;
transition:0.6s;
animation: pulse 2s infinite;
}

@keyframes pulse{
0%{ transform:scale(1);}
50%{ transform:scale(1.05);}
100%{ transform:scale(1);}
}

.envelope:before{
content:"";
position:absolute;
top:-110px;
border-left:160px solid transparent;
border-right:160px solid transparent;
border-bottom:110px solid #ff8fab;
transition:0.8s;
}

.envelope.open:before{
transform:rotateX(180deg);
top:-50px;
}

.envelope.hide{
display:none;
}

.click-text{
font-size:24px;
font-weight:bold;
color:white;
text-shadow:2px 2px 6px #000;
}

.message{
text-align:center;
font-size:30px;
color:white;
display:none;
padding:20px;
white-space:pre-line;
margin:20px 0;
}

video{
display:none;
width:350px;
max-width:90vw;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
margin:10px 0;
}

.confetti{
position:absolute;
font-size:22px;
animation: explode 1.5s ease-out forwards;
}

@keyframes explode{
0%{ transform:translate(0,0) scale(1); opacity:1;}
100%{ transform:translate(var(--x),var(--y)) rotate(720deg); opacity:0;}
}

.bottom-text{
display:none;
width:100%;
text-align:center;
font-size:24px;
color:white;
margin-top:40px;
margin-bottom:30px;
font-weight:bold;
text-shadow:0 0 10px #fff,0 0 20px #ff69b4,0 0 30px #ff1493;
animation: glow 2s ease-in-out infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 10px #fff,0 0 20px #ff69b4; }
to{ text-shadow:0 0 30px #ff85c2,0 0 40px #ff1493; }
}

/* 🎮 OYUN BUTONU */
.game-btn{
margin-top:10px;
padding:10px 20px;
border:none;
border-radius:10px;
background:#ff3d6e;
color:white;
font-size:18px;
cursor:pointer;
display:none;
}

/* 🏍️ OYUN ALANI */
#gameArea{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#222;
}

canvas{
display:block;
margin:auto;
background:#333;
}

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
font-size:18px;
}

</style>
</head>

<body>

<!-- 💌 MEKTUP -->
<div class="envelope" onclick="openLetter()">
<div class="click-text">TIKLA 💌</div>
</div>

<button class="game-btn" id="gameBtn" onclick="startGameScreen()">🏍️ Oyuna Gir</button>

<video id="videoTop" autoplay muted loop controls>
<source src="ustvideo.mp4" type="video/mp4">
</video>

<div class="message" id="message"></div>

<video id="videoBottom" autoplay muted loop controls>
<source src="altvideo.mp4" type="video/mp4">
</video>

<div class="bottom-text">💖 hayatıma giren en güzel mucizesin 💖</div>

<audio id="bgMusic" src="muzik.mp3"></audio>

<!-- 🏍️ OYUN -->
<div id="gameArea">
<div id="ui">Skor: 0</div>
<canvas id="gameCanvas" width="400" height="600"></canvas>
</div>

<script>

/* -------- MEKTUP KODUN AYNI -------- */

let cake=document.createElement("div");
cake.innerHTML="🎂";
cake.style.fontSize="80px";
cake.style.position="fixed";
cake.style.bottom="20px";
cake.style.right="20px";
cake.style.display="none";
document.body.appendChild(cake);

let text="🌸✨️🧸\nDOĞUM GÜNÜN KUTLU OLSUN 🥳🥳\nİYİ Kİ DOĞDUN MELEĞİM🪽\n🧸✨️🌸";
let i=0;
let effectsStarted=false;

function typeWriter(){
if(i<text.length){
document.getElementById("message").innerHTML+=text.charAt(i);
i++;
setTimeout(typeWriter,60);
}
}

/* 💌 MEKTUP AÇ */
function openLetter(){

document.querySelector('.envelope').classList.add('hide');

document.getElementById('videoTop').style.display="block";
document.getElementById('videoBottom').style.display="block";

document.getElementById('message').style.display="block";
document.querySelector('.bottom-text').style.display="block";

/* 🎮 OYUN BUTONU GÖSTER */
document.getElementById("gameBtn").style.display="block";

let music=document.getElementById("bgMusic");
music.play();

typeWriter();
}

/* -------- OYUNA GEÇ -------- */
function startGameScreen(){
document.getElementById("gameArea").style.display="block";
document.querySelector('.envelope').style.display="none";
document.getElementById("gameBtn").style.display="none";
startGame();
}

/* -------- OYUN -------- */

const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");

const bikeImg=new Image();
bikeImg.src="assets/motor.png";

let player,score=0;

function startGame(){
player={x:170,y:480,w:60,h:100,s:6};
requestAnimationFrame(loop);
}

let left=false,right=false;

document.addEventListener("keydown",e=>{
if(e.key=="ArrowLeft") left=true;
if(e.key=="ArrowRight") right=true;
});
document.addEventListener("keyup",e=>{
if(e.key=="ArrowLeft") left=false;
if(e.key=="ArrowRight") right=false;
});

function loop(){
ctx.fillStyle="#111";
ctx.fillRect(0,0,400,600);

if(left) player.x-=player.s;
if(right) player.x+=player.s;

player.x=Math.max(0,Math.min(340,player.x));

ctx.drawImage(bikeImg,player.x,player.y,player.w,player.h);

requestAnimationFrame(loop);
}

</script>

</body>
</html>
