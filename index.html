<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meleğimin Doğum Günü + Oyun</title>

<style>
body{
margin:0;
font-family:Segoe UI;
background:radial-gradient(circle at top,#ffd6e8,#ff8fab);
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

/* 💌 MEKTUP */
.envelope{
width:320px;height:220px;
background:linear-gradient(45deg,#ffb3c6,#ffc2d1);
border-radius:15px;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
position:relative;
box-shadow:0 10px 30px rgba(0,0,0,.3);
}

.click-text{color:white;font-size:24px;font-weight:bold;text-shadow:2px 2px 5px black}

.hidden{display:none}

/* TEXT */
.message{
display:none;
text-align:center;
font-size:26px;
color:white;
white-space:pre-line;
padding:20px;
}

/* BUTTONS */
.btn{
padding:10px 20px;
border:none;
border-radius:10px;
margin:10px;
cursor:pointer;
font-size:18px;
background:#ff3d6e;
color:white;
}

/* GAME AREA */
#gameArea{
display:none;
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:#222;
}

canvas{
background:#333;
display:block;
margin:auto;
}

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
font-size:18px;
}

/* SKIN MENU */
#skinMenu{
display:none;
flex-direction:column;
align-items:center;
}

.skin{
background:#222;
margin:10px;
padding:10px;
border-radius:10px;
color:white;
cursor:pointer;
}

.skin img{width:80px;display:block;margin:auto}

</style>
</head>

<body>

<!-- 💌 MEKTUP -->
<div id="letter" class="envelope" onclick="openLetter()">
<div class="click-text">TIKLA 💌</div>
</div>

<div id="message" class="message">
🌸 DOĞUM GÜNÜN KUTLU OLSUN 🌸
</div>

<button id="playBtn" class="btn hidden" onclick="openSkinMenu()">🏍️ Oyuna Gir</button>

<!-- 🏍️ SKIN MENU -->
<div id="skinMenu">
<h2>Motor Seç</h2>

<div class="skin" onclick="startGame('assets/motor1.png')">
<img src="assets/motor1.png">
Hızlı Motor
</div>

<div class="skin" onclick="startGame('assets/motor2.png')">
<img src="assets/motor2.png">
Spor Motor
</div>

<div class="skin" onclick="startGame('assets/motor3.png')">
<img src="assets/motor3.png">
Klasik Motor
</div>
</div>

<!-- 🏍️ OYUN -->
<div id="gameArea">
<div id="ui">Skor: 0</div>
<canvas id="c" width="400" height="600"></canvas>
</div>

<script>

/* 💌 MEKTUP */
function openLetter(){
document.getElementById("message").style.display="block";
document.getElementById("playBtn").classList.remove("hidden");
document.getElementById("letter").style.display="none";
}

/* 🎮 SKIN MENU */
function openSkinMenu(){
document.getElementById("skinMenu").style.display="flex";
document.getElementById("message").style.display="none";
document.getElementById("playBtn").style.display="none";
}

/* 🏍️ GAME */
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");

let player={x:170,y:480,w:60,h:100,s:6};
let img=new Image();
let score=0;

let left=false,right=false;

document.addEventListener("keydown",e=>{
if(e.key=="ArrowLeft") left=true;
if(e.key=="ArrowRight") right=true;
});
document.addEventListener("keyup",e=>{
if(e.key=="ArrowLeft") left=false;
if(e.key=="ArrowRight") right=false;
});

function startGame(skin){
document.getElementById("skinMenu").style.display="none";
document.getElementById("gameArea").style.display="block";

img.src=skin;

loop();
}

function loop(){

ctx.fillStyle="#111";
ctx.fillRect(0,0,400,600);

if(left) player.x-=player.s;
if(right) player.x+=player.s;

player.x=Math.max(0,Math.min(340,player.x));

ctx.drawImage(img,player.x,player.y,player.w,player.h);

score++;
document.getElementById("ui").innerText="Skor: "+score;

requestAnimationFrame(loop);
}

</script>

</body>
</html>
