<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Romantik Doğum Günü</title>

<style>
body{
margin:0;
padding:0;
overflow-x:hidden;
font-family:'Segoe UI', cursive;
background: radial-gradient(circle at top,#ffd6e8,#ff8fab);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
min-height:100vh;
}

/* Arka plan kalpler */
.bg-heart{
position:absolute;
font-size:22px;
animation: floatUp 10s linear infinite;
opacity:0.7;
}

@keyframes floatUp{
0%{ transform:translateY(100vh) scale(0.5); opacity:0;}
50%{ opacity:1;}
100%{ transform:translateY(-10vh) scale(1.2); opacity:0;}
}

/* Mektup */
.envelope{
width:320px;
height:220px;
background: linear-gradient(45deg,#ffb3c6,#ffc2d1);
border-radius:15px;
position:relative;
cursor:pointer;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
display:flex;
justify-content:center;
align-items:center;
transition:0.6s;
animation: pulse 2s infinite;
}

@keyframes pulse{
0%{ transform:scale(1);}
50%{ transform:scale(1.05);}
100%{ transform:scale(1);}
}

.envelope:before{
content:"";
position:absolute;
top:-110px;
border-left:160px solid transparent;
border-right:160px solid transparent;
border-bottom:110px solid #ff8fab;
transition:0.8s;
}

.envelope.open:before{
transform:rotateX(180deg);
top:-50px;
}

.envelope.hide{
display:none;
}

.click-text{
font-size:24px;
font-weight:bold;
color:white;
text-shadow:2px 2px 6px #000;
}

.message{
text-align:center;
font-size:30px;
color:white;
display:none;
padding:20px;
white-space:pre-line;
margin:20px 0;
}

video{
display:none;
width:350px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
margin:10px 0;
}

/* Konfeti */
.confetti{
position:absolute;
font-size:22px;
animation: explode 1.5s ease-out forwards;
}

@keyframes explode{
0%{ transform:translate(0,0) scale(1); opacity:1;}
100%{ transform:translate(var(--x),var(--y)) rotate(720deg); opacity:0;}
}

/* GALERİ */
.gallery{
display:none;
gap:15px;
overflow-x:auto;
margin-top:20px;
}

.gallery img{
width:200px;
border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

/* pasta */
.cake{
position:fixed;
bottom:20px;
right:20px;
font-size:80px;
animation: cakeBounce 2s infinite;
}

@keyframes cakeBounce{
0%{transform:translateY(0)}
50%{transform:translateY(-15px)}
100%{transform:translateY(0)}
}
</style>
</head>

<body>

<div class="envelope" onclick="openLetter()">
<div class="click-text">TIKLA 💌</div>
</div>

<video id="videoTop" autoplay muted loop controls>
<source src="ustvideo.mp4" type="video/mp4">
</video>

<div class="message" id="message"></div>

<video id="videoBottom" autoplay muted loop controls>
<source src="altvideo.mp4" type="video/mp4">
</video>

<div class="gallery" id="gallery">
<img src="foto1.jpg">
<img src="foto2.jpg">
<img src="foto3.jpg">
</div>

<div class="cake">🎂</div>

<audio id="bgMusic" src="muzik.mp3"></audio>

<script>

let text="🌸✨️🧸\nDOĞUM GÜNÜN KUTLU OLSUN 🥳🥳\nİYİ Kİ DOĞDUN MELEĞİM🪽\n🧸✨️🌸";
let i=0;

function typeWriter(){
if(i<text.length){
document.getElementById("message").innerHTML+=text.charAt(i);
i++;
setTimeout(typeWriter,60);
}
}

function openLetter(){

let envelope=document.querySelector('.envelope');
envelope.classList.add('open');

setTimeout(()=>{
envelope.classList.add('hide');
document.getElementById('videoTop').style.display="block";
document.getElementById('videoBottom').style.display="block";
document.getElementById('gallery').style.display="flex";
},800);

document.querySelector('.click-text').style.display="none";
document.getElementById('message').style.display="block";

fadeMusic();
explodeConfetti();
typeWriter();

extraMessage();

}

/* müzik fade */
function fadeMusic(){
let music=document.getElementById("bgMusic");
music.volume=0;
music.play().catch(()=>{});

let vol=0;

let fade=setInterval(()=>{
if(vol<1){
vol+=0.05;
music.volume=vol;
}else{
clearInterval(fade);
}
},200);
}

/* sürpriz mesaj */
function extraMessage(){

setTimeout(()=>{
let extra=document.createElement("div");

extra.innerHTML="💖 hayatıma giren en güzel mucizesin 💖";

extra.style.fontSize="26px";
extra.style.color="white";
extra.style.marginTop="20px";

document.body.appendChild(extra);

},10000);

}

/* konfeti */
function explodeConfetti(){

for(let i=0;i<60;i++){

let conf=document.createElement("div");

conf.className="confetti";

conf.innerHTML=["🎉","✨","💖","🌸"][Math.floor(Math.random()*4)];

conf.style.left="50%";
conf.style.top="50%";

let x=(Math.random()-0.5)*800+"px";
let y=(Math.random()-0.5)*600+"px";

conf.style.setProperty('--x',x);
conf.style.setProperty('--y',y);

document.body.appendChild(conf);

setTimeout(()=>conf.remove(),1500);

}

}

/* tıklayınca kalp */
document.addEventListener("click",(e)=>{

let heart=document.createElement("div");

heart.innerHTML="❤️";

heart.style.position="absolute";
heart.style.left=e.pageX+"px";
heart.style.top=e.pageY+"px";
heart.style.fontSize="30px";

heart.style.animation="explode 1s forwards";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),1000);

});

/* uçan kalpler */

for(let i=0;i<25;i++){

let heart=document.createElement("div");

heart.className="bg-heart";

heart.innerHTML="💗";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(18+Math.random()*25)+"px";

heart.style.animationDuration=(6+Math.random()*6)+"s";

document.body.appendChild(heart);

}

/* çiçek */

for(let i=0;i<20;i++){

let flower=document.createElement("div");

flower.className="bg-heart";

flower.innerHTML="🌸";

flower.style.left=Math.random()*100+"vw";

flower.style.fontSize=(18+Math.random()*25)+"px";

flower.style.animationDuration=(8+Math.random()*6)+"s";

document.body.appendChild(flower);

}

/* gül */

for(let i=0;i<15;i++){

let rose=document.createElement("div");

rose.className="bg-heart";

rose.innerHTML="🌹";

rose.style.left=Math.random()*100+"vw";

rose.style.fontSize=(18+Math.random()*25)+"px";

rose.style.animationDuration=(9+Math.random()*6)+"s";

document.body.appendChild(rose);

}

</script>

</body>
</html>
